name: "✨ Feature Request"
description: "提交新需求 / 功能增强 / 未来规划"
title: "[Feature] "
labels: ["type:feature", "status:triage"]
body:
  - type: dropdown
    id: subtype
    attributes:
      label: 类型
      options: [feature, enhancement, roadmap]
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: 优先级
      options: [P0, P1, P2, P3]
    validations:
      required: true
  - type: input
    id: skill_main
    attributes:
      label: 主 Skill
      placeholder: "notex-skills"
    validations:
      required: true
  - type: input
    id: skill_related
    attributes:
      label: 关联 Skill（可选）
  - type: textarea
    id: background
    attributes:
      label: 需求背景
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 方案描述
    validations:
      required: true
  - type: textarea
    id: value
    attributes:
      label: 价值与收益
    validations:
      required: true
  - type: textarea
    id: dod
    attributes:
      label: 验收标准（DoD）
    validations:
      required: true
