name: issue-label-guard
on:
  issues:
    types: [opened, edited, labeled, unlabeled]
permissions:
  issues: write
jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - name: Check required label families
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const labels = (issue.labels || []).map(l => l.name);
            const hasType = labels.some(l => l.startsWith('type:'));
            const hasSkill = labels.some(l => l.startsWith('skill:'));
            const needs = [];
            if (!hasType) needs.push('type:*');
            if (!hasSkill) needs.push('skill:*');
            const marker = '<!-- label-guard -->';
            const body = `${marker}\n请补充必需标签：${needs.join('、')}\n\n建议：至少一个 type:* + 至少一个 skill:*。`;
            const { owner, repo } = context.repo;
            const issue_number = issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, { owner, repo, issue_number, per_page: 100 });
            const existing = comments.find(c => (c.body||'').includes(marker));
            if (needs.length === 0) {
              if (existing) {
                await github.rest.issues.deleteComment({ owner, repo, comment_id: existing.id });
              }
              return;
            }
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }
