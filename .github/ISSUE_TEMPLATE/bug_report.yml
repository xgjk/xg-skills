name: "🐞 Bug Report"
description: "提交缺陷问题（触发异常、鉴权异常、功能错误等）"
title: "[Bug] "
labels: ["type:bug", "status:triage"]
body:
  - type: dropdown
    id: severity
    attributes:
      label: 严重度
      options: [critical, major, minor]
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: 优先级
      options: [P0, P1, P2, P3]
    validations:
      required: true
  - type: input
    id: skill_main
    attributes:
      label: 主 Skill
      placeholder: "cms-auth-skills"
    validations:
      required: true
  - type: input
    id: skill_related
    attributes:
      label: 关联 Skill（可选）
      placeholder: "notex-skills"
  - type: textarea
    id: expected
    attributes:
      label: 期望行为
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 实际行为
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: 最小复现步骤
      placeholder: "1. 前置条件\n2. 输入/操作\n3. 实际结果\n4. 期望结果"
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: 影响范围
      placeholder: "影响用户、流程、频率"
    validations:
      required: true
  - type: textarea
    id: dod
    attributes:
      label: 验收标准（DoD）
      placeholder: "- [ ] 验收点1"
    validations:
      required: true
