name: "🔒 Security Issue"
description: "安全问题（请勿公开敏感细节）"
title: "[Security] "
labels: ["type:security", "priority:P0", "status:triage"]
body:
  - type: markdown
    attributes:
      value: "⚠️ 请勿在公开 issue 中披露可利用细节、密钥、token。"
  - type: textarea
    id: summary
    attributes: { label: 安全问题概要 }
    validations: { required: true }
  - type: textarea
    id: impact
    attributes: { label: 影响范围 }
    validations: { required: true }
