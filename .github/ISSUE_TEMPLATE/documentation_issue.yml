name: "📚 Documentation Issue"
description: "文档不一致、缺失、错误"
title: "[Docs] "
labels: ["type:docs", "status:triage"]
body:
  - type: input
    id: doc_path
    attributes: { label: 文档路径/链接 }
    validations: { required: true }
  - type: textarea
    id: issue
    attributes: { label: 问题描述 }
    validations: { required: true }
  - type: textarea
    id: expected
    attributes: { label: 建议修正文案/结构 }
    validations: { required: true }
