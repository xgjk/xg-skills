name: "🗺️ Roadmap Proposal"
description: "未来规划、阶段目标、里程碑建议"
title: "[Roadmap] "
labels: ["type:roadmap", "status:triage"]
body:
  - type: textarea
    id: vision
    attributes: { label: 目标与愿景 }
    validations: { required: true }
  - type: textarea
    id: milestones
    attributes: { label: 里程碑（M1/M2/M3） }
    validations: { required: true }
  - type: textarea
    id: risks
    attributes: { label: 风险与依赖 }
    validations: { required: true }
